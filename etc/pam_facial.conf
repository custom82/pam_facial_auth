# ================================
# pam_facial_auth configuration
# ================================

# Directory base per immagini e modelli
#  immagini:  /etc/pam_facial_auth/images/<user>/
#  modelli:   /etc/pam_facial_auth/models/<user>.xml
basedir=/etc/pam_facial_auth

# ================================
# Camera configuration
# ================================

# Se vuoto usa camera_index
device=
camera_index=0

# Numero di frame usati per train/test
frames=10

# Dimensione dei volti normalizzati
width=200
height=200

# Millisecondi di sleep tra un frame e l'altro
sleep_ms=150

# Soglia per i metodi classici (LBPH/Eigen/Fisher)
threshold=60.0

# Debug / overwrite
debug=false
force_overwrite=false


# ================================
# DNN - configurazione generale
# ================================

# Tipo di rete principale se NON si usa un profilo:
#   caffe | tensorflow | onnx | openvino | tflite | torch
dnn_type=onnx

# Modello di default se NON si usa --dnn-profile
# (puoi comunque lasciarlo vuoto se usi sempre i profili)
dnn_model=/usr/share/opencv4/dnn/models/facial/face_recognizer_fast.onnx
dnn_proto=

# cpu | opencl | cuda | openvino
dnn_device=cpu

# soglia logica [0-1] per i backend DNN (per il match embedding)
dnn_threshold=0.6

# Profilo DNN di default usato quando lanci:
#   facial_training --method dnn
# senza specificare --dnn-profile.
# Valori possibili (vedi elenco sotto):
#   fast, sface, lresnet100, openface,
#   yunet, emotion, keypoints,
#   det_uint8, det_caffe, det_fp16,
#   mp_landmark, mp_face, mp_blend
dnn_profile=sface


# ================================
# Detector configuration
# ================================

# Profilo DNN per il DETECTOR (gate di face detection):
#   ""         -> nessun detector DNN, solo Haar cascade
#   det_uint8  -> TensorFlow pb (opencv_face_detector_uint8.pb)
#   det_caffe  -> Caffe (opencv_face_detector.caffemodel + prototxt)
#   det_fp16   -> Caffe FP16 (opencv_face_detector_fp16.caffemodel)
#   yunet      -> YuNet ONNX (best effort, altrimenti fallback Haar)
detector_profile=det_uint8

# soglia [0-1] per il punteggio del detector DNN
detector_threshold=0.6

# Path assoluto alla Haar cascade di fallback
haar_cascade=/usr/share/opencv4/haarcascades/haarcascade_frontalface_default.xml


# ================================
# DNN - elenco modelli facciali
# Tutti i path sono ASSOLUTI e modificabili.
# ================================

# 1) Reti di riconoscimento volto (embedding / classifier)
dnn_model_fast=/usr/share/opencv4/dnn/models/facial/face_recognizer_fast.onnx
dnn_model_sface=/usr/share/opencv4/dnn/models/facial/face_recognition_sface_2021dec.onnx
dnn_model_lresnet100=/usr/share/opencv4/dnn/models/facial/LResNet100E_IR.onnx
dnn_model_openface=/usr/share/opencv4/dnn/models/facial/openface_nn4.small2.v1.t7

# 2) Reti di rilevamento volto (detector SSD / YuNet)
dnn_model_yunet=/usr/share/opencv4/dnn/models/facial/yunet-202303.onnx
dnn_model_detector_caffe=/usr/share/opencv4/dnn/models/facial/opencv_face_detector.caffemodel
dnn_model_detector_fp16=/usr/share/opencv4/dnn/models/facial/opencv_face_detector_fp16.caffemodel
dnn_model_detector_uint8=/usr/share/opencv4/dnn/models/facial/opencv_face_detector_uint8.pb

# Prototxt Caffe per i detector opencv_face_detector*.caffemodel
# (usato dai profili: det_caffe, det_fp16)
dnn_proto_detector_caffe=/usr/share/opencv4/samples/dnn/face_detector/deploy.prototxt

# 3) Emotion / keypoints / MediaPipe TFLite
dnn_model_emotion=/usr/share/opencv4/dnn/models/facial/emotion_ferplus.onnx
dnn_model_keypoints=/usr/share/opencv4/dnn/models/facial/facial_keypoints.onnx
dnn_model_face_landmark_tflite=/usr/share/opencv4/dnn/models/facial/face_landmark.tflite
dnn_model_face_detection_tflite=/usr/share/opencv4/dnn/models/facial/face_detection_short_range.tflite
dnn_model_face_blendshapes_tflite=/usr/share/opencv4/dnn/models/facial/face_blendshapes.tflite
