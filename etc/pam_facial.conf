###############################################################
#           PAM Facial Authentication - Config File           #
#          Path: /etc/security/pam_facial.conf               #
###############################################################

############################
# Directory base
############################
# Tutto (immagini + modelli XML + file DNN) risiede qui.
basedir = /etc/pam_facial_auth


############################
# Directory modelli
############################
# I modelli XML vengono salvati in:
#   /etc/pam_facial_auth/models/<user>.xml
model_path = /etc/pam_facial_auth/models


############################
# Haar Cascade Detector
############################
# Usato per il rilevamento facciale se face_detection_method = haar
haar_cascade_path = /usr/share/opencv4/haarcascades/haarcascade_frontalface_default.xml


############################
# Webcam
############################
device = /dev/video0
camera_index = 0          # usato solo se device è vuoto
frame_width  = 640
frame_height = 480


############################
# Parametri generali
############################
threshold = 80.0          # usato da LBPH / Eigen / Fisher
sleep_ms  = 150
frames    = 10
debug     = true
force_overwrite = false
disable_gui = false


############################
# Logging
############################
log_file = /var/log/pam_facial_auth.log
verbose  = true


############################
# Metodo di training
############################
# lbph | eigen | fisher | dnn
training_method = lbph


###############################################################
#                    SEZIONE DNN                              #
###############################################################

###############
# Tipo DNN
###############
# caffe | tensorflow | onnx | openvino
dnn_type = caffe

###############
# Percorsi modello DNN
###############
# Caffe:      .caffemodel + .prototxt
# TensorFlow: .pb (+ .pbtxt)
# ONNX:       .onnx
# OpenVINO:   .xml + .bin
dnn_model = /etc/pam_facial_auth/models/dnn_model.caffemodel
dnn_proto = /etc/pam_facial_auth/models/dnn_deploy.prototxt

###############
# Device DNN
###############
# cpu | cuda | opencl | openvino
dnn_device = cpu

###############
# Soglia DNN
###############
# 0.6 valore comune per SSD/ResNet
dnn_threshold = 0.6


############################
# Metodo di rilevamento volto
############################
# haar = HaarCascade
# dnn  = usa un detector DNN
face_detection_method = haar
